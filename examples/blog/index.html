<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="i18n" content="./locales" data-available="en,es,fr" data-fallback="en">
  <title data-i18n="app_title"></title>
  <link rel="stylesheet" href="https://unpkg.com/@picocss/pico@2/css/pico.classless.min.css">
  <link rel="stylesheet" href="./styles.css">
  <script type="module" src="./app.js"></script>
</head>
<body>
  <header>
    <nav>
      <ul>
        <li><a href="#/" data-i18n="nav_home"></a></li>
        <li><a href="#/about" data-i18n="nav_about"></a></li>
      </ul>
      <ul>
        <li>
          <label for="lang-select" data-i18n="locale_label"></label>
          <select id="lang-select" name="lang" aria-label="Switch language">
            <option value="en">English</option>
            <option value="es">Español</option>
            <option value="fr">Français</option>
          </select>
        </li>
      </ul>
    </nav>
  </header>

  <main>
    <section data-route="home">
      <hgroup>
        <h1 data-i18n="home_title"></h1>
        <p data-i18n="post_count" data-i18n-qty="0"></p>
      </hgroup>
      <ul id="post-list"></ul>
    </section>

    <section data-route="post">
      <article id="post-view">
        <header>
          <h1 data-text="title"></h1>
          <p data-i18n="posted_at" data-i18n-val="" data-i18n-type="date"></p>
        </header>
        <p data-text="body"></p>
        <footer>
          <h2 data-i18n="comments_heading"></h2>
          <p data-i18n="comments_count" data-i18n-qty="0"></p>
          <ul id="comments-list"></ul>
          <form id="comment-form">
            <label for="comment-input" data-i18n="comment_form_label"></label>
            <textarea id="comment-input" name="text" required aria-label="Comment text"></textarea>
            <button type="submit" data-i18n="comment_form_submit"></button>
          </form>
        </footer>
      </article>
    </section>

    <section data-route="about">
      <hgroup>
        <h1 data-i18n="about_title"></h1>
        <p data-i18n="about_body"></p>
      </hgroup>
    </section>
  </main>

  <template id="post-list-item">
    <li data-item>
      <a data-action="open-post">
        <strong data-text="title"></strong>
      </a>
    </li>
  </template>

  <template id="comment-item">
    <li data-item>
      <p data-text="text"></p>
    </li>
  </template>
</body>
</html>
